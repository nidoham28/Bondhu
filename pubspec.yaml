name: bondhu
description: "Bondhu - A modern scalable social media platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # iOS style icons (existing — harmless to keep)
  cupertino_icons: ^1.0.8

  # ═══════════════════════════════════════════
  # STATE MANAGEMENT
  # ═══════════════════════════════════════════
  # Compile-safe, scalable, minimal boilerplate DI + state management
  flutter_riverpod: ^2.6.1

  # ═══════════════════════════════════════════
  # NAVIGATION
  # ═══════════════════════════════════════════
  # Declarative routing, deep-linking, web URL support
  go_router: ^14.6.0

  # ═══════════════════════════════════════════
  # BACKEND (Supabase)
  # ═══════════════════════════════════════════
  # Auth + PostgreSQL + Realtime + Storage + Edge Functions
  supabase_flutter: ^2.8.0

  # ═══════════════════════════════════════════
  # CONFIGURATION
  # ═══════════════════════════════════════════
  # Public env config loader (URL/Anon Key only — NEVER service_role key)
  flutter_dotenv: ^5.2.1

  # ═══════════════════════════════════════════
  # MEDIA & IMAGES
  # ═══════════════════════════════════════════
  cached_network_image: ^3.4.1      # Efficient image caching + loading
  image_picker: ^1.1.2              # Camera/gallery image selection
  flutter_svg: ^2.0.10              # SVG icon support

  # ═══════════════════════════════════════════
  # UI / UX
  # ═══════════════════════════════════════════
  google_fonts: ^6.2.1              # Custom font loading (Inter, etc.)
  shimmer: ^3.0.0                   # Skeleton loading effect

  # ═══════════════════════════════════════════
  # UTILITIES
  # ═══════════════════════════════════════════
  intl: ^0.19.0                     # Date/number formatting, localization
  timeago: ^3.7.0                   # Relative time strings ("2 mins ago")
  uuid: ^4.5.1                      # UUID generation for IDs

  # ═══════════════════════════════════════════
  # PERMISSIONS & DEVICE
  # ═══════════════════════════════════════════
  permission_handler: ^11.3.1       # Camera, storage, notification permissions

  # ═══════════════════════════════════════════
  # LOCAL CACHE
  # ═══════════════════════════════════════════
  shared_preferences: ^2.3.2        # Lightweight key-value local storage

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets configuration for Bondhu
  assets:
    - .env                          # Public Supabase config
    - assets/images/
    - assets/icons/