name: bondhu
description: "Bondhu - A modern scalable social media platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ═══════════════════════════════════════════
  # STATE MANAGEMENT
  # ═══════════════════════════════════════════
  flutter_riverpod: ^2.6.1

  # ═══════════════════════════════════════════
  # NAVIGATION
  # ═══════════════════════════════════════════
  go_router: ^14.6.0

  # ═══════════════════════════════════════════
  # BACKEND (Supabase)
  # ═══════════════════════════════════════════
  supabase_flutter: ^2.8.0

  # ═══════════════════════════════════════════
  # CONFIGURATION
  # ═══════════════════════════════════════════
  flutter_dotenv: ^5.2.1

  # ═══════════════════════════════════════════
  # MEDIA & IMAGES
  # ═══════════════════════════════════════════
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  path: ^1.9.0 # For parsing file extensions during upload
  flutter_svg: ^2.0.10

  # ═══════════════════════════════════════════
  # UI / UX
  # ═══════════════════════════════════════════
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # ═══════════════════════════════════════════
  # UTILITIES
  # ═══════════════════════════════════════════
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1

  # ═══════════════════════════════════════════
  # PERMISSIONS & DEVICE
  # ═══════════════════════════════════════════
  permission_handler: ^11.3.1

  # ═══════════════════════════════════════════
  # LOCAL CACHE
  # ═══════════════════════════════════════════
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ═══════════════════════════════════════════
  # APP LAUNCHER ICON GENERATOR
  # ═══════════════════════════════════════════
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

    - assets/icons/app_logo.png

# ═══════════════════════════════════════════
# LAUNCHER ICON CONFIGURATION
# ═══════════════════════════════════════════
# একবার রান করলে Android, iOS, Web সব জায়গায় আইকন জেনারেট হয়ে যাবে
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#6C63FF"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"